name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore RetailPOS.sln

      - name: Build
        run: dotnet build RetailPOS.sln -c Release --no-restore

      - name: Test
        run: >-
          dotnet test RetailPOS.sln -c Release --no-build --no-restore
          --logger "trx;LogFilePrefix=test-results"
          --results-directory TestResults
          --collect "XPlat Code Coverage"

      - name: Publish test and coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-and-coverage
          path: TestResults
          if-no-files-found: error
          retention-days: 14

      - name: Check pull request whitespace
        if: github.event_name == 'pull_request'
        run: git diff --check "origin/${{ github.base_ref }}...HEAD"

      - name: Check pushed commit whitespace
        if: github.event_name == 'push'
        run: git diff --check HEAD^ HEAD
