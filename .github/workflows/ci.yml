name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore RetailPOS.sln

      - name: Build
        run: dotnet build RetailPOS.sln -c Release --no-restore

      - name: Test
        run: dotnet test RetailPOS.sln -c Release --no-build --no-restore

      - name: Check pull request whitespace
        if: github.event_name == 'pull_request'
        run: git diff --check "origin/${{ github.base_ref }}...HEAD"

      - name: Check pushed commit whitespace
        if: github.event_name == 'push'
        run: git diff --check HEAD^ HEAD
